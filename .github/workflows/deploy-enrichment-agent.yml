name: Deploy Enrichment Agent

on:
  push:
    branches:
      - main
    paths:
      - 'enrichment-agent/**'
      - '.github/workflows/deploy-enrichment-agent.yml'

env:
  REGISTRY: hwbase00211.azurecr.io
  IMAGE_NAME: habitwealth-agent
  CONTAINER_APP: hwbase-agent-00211
  RESOURCE_GROUP: habitwealthtest-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout code
        uses: actions/checkout@8fa39a3ceacb2a7d3c94b6c8e6b2e4c9c9e9e9e9

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8a0c8a5e6e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e

      - name: Log in to Azure Container Registry
        uses: docker/login-action@c8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8
        with:
          context: ./enrichment-agent
          file: ./enrichment-agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Image pushed successfully
        run: |
          echo "✅ Docker image pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Container App will auto-pull the latest image within 1-2 minutes"
